app:
  name: online-finetune-api
  env: dev

execution:
  engine: local

db:
  url: "sqlite+aiosqlite:///./finetune.db"
  echo: false
  auto_create: false

storage:
  kind: minio
  minio:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "finetune-artifacts"
    secure: false

k8s:
  namespace: "default"
  incluster: false
  kubeconfig: null

kubeflow:
  group: "kubeflow.org"
  version: "v1"
  plural: "pytorchjobs"
  image: "python:3.11-slim"

notification:
  sink: webhook
  webhook:
    endpoint: "http://localhost:9000/hooks/training"
    timeout_seconds: 5

oauth:
  authorize_url: "https://oauth.example.com/authorize"
  token_url: "https://oauth.example.com/token"
  client_id: "replace-me"
  client_secret: "replace-me"
  redirect_uri: "http://localhost:8000/api/v1/auth/callback"

prefect:
  api_url: "http://localhost:4200/api"
  ui_url: "http://localhost:4200"
  work_pool_name: "training-pool"
  work_pool_type: "process"
  flow_name: "train-job"
  concurrency_limit: 1

embedding:
  grpc_target: "localhost:50051"

inference:
  base_url: "http://localhost:8010"

llm:
  provider: "openai-compatible"
  base_url: ""
  api_key: ""
  model: "gpt-4o-mini"
  timeout_seconds: 30

label_studio:
  url: ""
  external_url: ""
  api_key: ""
  database_url: ""

presets:
  dir: "presets"
  strict: false

auth:
  jwt_secret_key: "replace-me-in-production"
  jwt_algorithm: "HS256"
  access_token_expire_minutes: 60
