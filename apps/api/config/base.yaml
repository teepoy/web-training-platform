app:
  name: online-finetune-api
  env: dev

execution:
  engine: local

db:
  url: "sqlite+aiosqlite:///./finetune.db"
  echo: false
  auto_create: false

storage:
  kind: memory
  minio:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "finetune-artifacts"
    secure: false

k8s:
  namespace: "default"
  incluster: false
  kubeconfig: null

kubeflow:
  group: "kubeflow.org"
  version: "v1"
  plural: "pytorchjobs"
  image: "python:3.11-slim"

notification:
  sink: webhook
  webhook:
    endpoint: "http://localhost:9000/hooks/training"
    timeout_seconds: 5

oauth:
  authorize_url: "https://oauth.example.com/authorize"
  token_url: "https://oauth.example.com/token"
  client_id: "replace-me"
  client_secret: "replace-me"
  redirect_uri: "http://localhost:8000/api/v1/auth/callback"
