app:
  env: test

execution:
  engine: local

db:
  url: "sqlite+aiosqlite:///./finetune-test.db"
  echo: false
  auto_create: true

storage:
  kind: memory

notification:
  sink: webhook
  webhook:
    endpoint: "http://localhost:9000/hooks/training"

label_studio:
  url: "http://localhost:8080"
  external_url: "http://localhost:8080"

oauth:
  enabled: false

agent:
  enabled: true
  max_panels: 8
  metadata_sample_size: 50

auth:
  enabled: true
