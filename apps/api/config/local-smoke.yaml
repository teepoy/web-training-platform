app:
  env: local-smoke

execution:
  engine: local

db:
  url: "sqlite+aiosqlite:///./finetune-local-smoke.db"
  echo: false
  auto_create: true

storage:
  kind: memory

notification:
  sink: webhook
  webhook:
    endpoint: "http://localhost:9000/hooks/training"

label_studio:
  url: "http://localhost:8080"
  external_url: "http://localhost:8080"

oauth:
  enabled: false
