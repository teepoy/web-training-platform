services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: finetune
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/prefect
    ports:
      - "4200:4200"
    command: ["prefect", "server", "start", "--host", "0.0.0.0"]
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  embedding:
    build:
      context: ../..
      dockerfile: apps/embedding/Dockerfile
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: on-failure

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      embedding:
        condition: service_healthy
    environment:
      APP_CONFIG_PROFILE: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finetune
      PREFECT_API_URL: http://prefect-server:4200/api
      EMBEDDING_GRPC_TARGET: embedding:50051
      LABEL_STUDIO_URL: ""
      LABEL_STUDIO_API_KEY: ""
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: finetune-artifacts
    ports:
      - "8000:8000"
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  flow-worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PLATFORM_API_URL: http://api:8000
    command: ["uv", "run", "python", "-m", "app.flows.serve"]
    restart: on-failure

  training-worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PLATFORM_API_URL: http://api:8000
      WORKER_MODE: v2
      WORK_POOL_NAME: training-pool
    command: ["uv", "run", "python", "-m", "app.flows.serve"]
    restart: on-failure

  label-studio:
    image: heartexlabs/label-studio:latest
    profiles:
      - labelstudio
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: postgres
      POSTGRE_PASSWORD: postgres
      POSTGRE_HOST: postgres
      POSTGRE_PORT: "5432"
      LABEL_STUDIO_USERNAME: admin@example.com
      LABEL_STUDIO_PASSWORD: admin123
    ports:
      - "8080:8080"
    volumes:
      - ls-data:/label-studio/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  minio-data:
  ls-data:
