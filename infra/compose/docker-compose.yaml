services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: finetune
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d prefect -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3.6.25-python3.12
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/prefect
    ports:
      - "4200:4200"
    command: ["prefect", "server", "start", "--host", "0.0.0.0"]
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  embedding:
    build:
      context: ../..
      dockerfile: apps/embedding/Dockerfile
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: on-failure

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      embedding:
        condition: service_healthy
      inference-worker:
        condition: service_healthy
      label-studio:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    environment:
      APP_CONFIG_PROFILE: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finetune
      PREFECT_API_URL: http://prefect-server:4200/api
      EMBEDDING_GRPC_TARGET: embedding:50051
      INFERENCE_BASE_URL: http://inference-worker:8010
      LABEL_STUDIO_URL: "http://label-studio:8080"
      LABEL_STUDIO_EXTERNAL_URL: "http://localhost:8080"
      LABEL_STUDIO_API_KEY: "ls-smoke-token-for-local-dev"
      LABEL_STUDIO_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/labelstudio"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: finetune-artifacts
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../libs/python-sdk:/app/libs/python-sdk
    command:
      [
        "/app/.venv/bin/python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  training-worker-gpu:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      APP_CONFIG_PROFILE: dev
      PREFECT_API_URL: http://prefect-server:4200/api
      PLATFORM_API_URL: http://api:8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finetune
      EMBEDDING_GRPC_TARGET: embedding:50051
      INFERENCE_BASE_URL: http://inference-worker:8010
      LABEL_STUDIO_URL: "http://label-studio:8080"
      LABEL_STUDIO_EXTERNAL_URL: "http://localhost:8080"
      LABEL_STUDIO_API_KEY: "ls-smoke-token-for-local-dev"
      LABEL_STUDIO_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/labelstudio"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: finetune-artifacts
      WORKER_MODE: v2
      WORK_POOL_NAME: training-pool
      WORK_QUEUE_NAME: train-gpu
    command: ["/app/.venv/bin/python", "-m", "app.flows.serve"]
    restart: on-failure

  training-worker-dspy:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      APP_CONFIG_PROFILE: dev
      PREFECT_API_URL: http://prefect-server:4200/api
      PLATFORM_API_URL: http://api:8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finetune
      EMBEDDING_GRPC_TARGET: embedding:50051
      INFERENCE_BASE_URL: http://inference-worker:8010
      LABEL_STUDIO_URL: "http://label-studio:8080"
      LABEL_STUDIO_EXTERNAL_URL: "http://localhost:8080"
      LABEL_STUDIO_API_KEY: "ls-smoke-token-for-local-dev"
      LABEL_STUDIO_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/labelstudio"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: finetune-artifacts
      WORKER_MODE: v2
      WORK_POOL_NAME: training-pool
      WORK_QUEUE_NAME: optimize-llm-cpu
    command: ["/app/.venv/bin/python", "-m", "app.flows.serve"]
    restart: on-failure

  prediction-worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    depends_on:
      prefect-server:
        condition: service_healthy
      inference-worker:
        condition: service_healthy
    environment:
      APP_CONFIG_PROFILE: dev
      PREFECT_API_URL: http://prefect-server:4200/api
      PLATFORM_API_URL: http://api:8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finetune
      EMBEDDING_GRPC_TARGET: embedding:50051
      INFERENCE_BASE_URL: http://inference-worker:8010
      LABEL_STUDIO_URL: "http://label-studio:8080"
      LABEL_STUDIO_EXTERNAL_URL: "http://localhost:8080"
      LABEL_STUDIO_API_KEY: "ls-smoke-token-for-local-dev"
      LABEL_STUDIO_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/labelstudio"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: finetune-artifacts
      WORKER_MODE: v2
      WORK_POOL_NAME: training-pool
      WORK_QUEUE_NAME: predict-batch
    command: ["/app/.venv/bin/python", "-m", "app.flows.serve"]
    restart: on-failure

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"
    volumes:
      - ../../apps/web/dist:/usr/share/nginx/html:ro
    restart: on-failure

  inference-worker:
    build:
      context: ../..
      dockerfile: apps/inference/Dockerfile
    environment:
      LLM_BASE_URL: http://host.docker.internal:11434/v1
      LLM_API_KEY: local-dev-token
      LLM_MODEL: llava
    ports:
      - "8010:8010"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: on-failure

  label-studio:
    image: heartexlabs/label-studio:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: labelstudio
      POSTGRE_USER: postgres
      POSTGRE_PASSWORD: postgres
      POSTGRE_HOST: postgres
      POSTGRE_PORT: "5432"
      LABEL_STUDIO_USERNAME: admin@example.com
      LABEL_STUDIO_PASSWORD: admin123
      LABEL_STUDIO_USER_TOKEN: "ls-smoke-token-for-local-dev"
      LABEL_STUDIO_ENABLE_LEGACY_API_TOKEN: "true"
    ports:
      - "8080:8080"
    volumes:
      - ls-data:/label-studio/data
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin-pgpass:/pgpass:ro
    restart: on-failure

volumes:
  pgdata:
  minio-data:
  ls-data:
  pgadmin-data:
