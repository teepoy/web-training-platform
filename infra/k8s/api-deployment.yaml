apiVersion: apps/v1
kind: Deployment
metadata:
  name: finetune-api
  namespace: finetune
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finetune-api
  template:
    metadata:
      labels:
        app: finetune-api
    spec:
      serviceAccountName: finetune-api
      containers:
        - name: api
          image: finetune-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: finetune-config
            - secretRef:
                name: finetune-secrets
          command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
---
apiVersion: v1
kind: Service
metadata:
  name: finetune-api
  namespace: finetune
spec:
  selector:
    app: finetune-api
  ports:
    - port: 8000
      targetPort: 8000
