apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-worker
  namespace: finetune
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-worker
  template:
    metadata:
      labels:
        app: inference-worker
    spec:
      containers:
        - name: inference-worker
          image: finetune-inference:latest
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8010"]
          ports:
            - containerPort: 8010
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: inference-worker
  namespace: finetune
spec:
  selector:
    app: inference-worker
  ports:
    - port: 8010
      targetPort: 8010
