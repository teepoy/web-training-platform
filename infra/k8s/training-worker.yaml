apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-worker
  namespace: finetune
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-worker
  template:
    metadata:
      labels:
        app: training-worker
    spec:
      containers:
        - name: training-worker
          image: finetune-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "python", "-m", "app.flows.serve"]
          env:
            - name: PREFECT_API_URL
              value: "http://prefect-server.finetune.svc.cluster.local:4200/api"
            - name: PLATFORM_API_URL
              value: "http://finetune-api.finetune.svc.cluster.local:8000"
            - name: WORKER_MODE
              value: v2
            - name: WORK_POOL_NAME
              value: training-pool
