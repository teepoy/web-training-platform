apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: finetune
data:
  create-extra-dbs.sql: |
    SELECT 'CREATE DATABASE prefect'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'prefect')\gexec

    SELECT 'CREATE DATABASE labelstudio'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'labelstudio')\gexec
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: finetune
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: finetune
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: finetune-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finetune-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: pgdata
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: finetune
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
