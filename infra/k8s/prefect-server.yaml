apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  namespace: finetune
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
    spec:
      containers:
        - name: prefect-server
          image: prefecthq/prefect:3.6.25-python3.12
          command: ["prefect", "server", "start", "--host", "0.0.0.0"]
          ports:
            - containerPort: 4200
          env:
            - name: PREFECT_API_DATABASE_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: finetune-secrets
                  key: PREFECT_DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4200
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4200
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: prefect-server
  namespace: finetune
spec:
  selector:
    app: prefect-server
  ports:
    - port: 4200
      targetPort: 4200
