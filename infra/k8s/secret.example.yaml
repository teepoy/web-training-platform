apiVersion: v1
kind: Secret
metadata:
  name: finetune-secrets
  namespace: finetune
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres.finetune.svc.cluster.local:5432/finetune"
  MINIO_ENDPOINT: "minio.finetune.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  MINIO_BUCKET: "finetune-artifacts"
