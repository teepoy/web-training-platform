apiVersion: v1
kind: Secret
metadata:
  name: finetune-secrets
  namespace: finetune
type: Opaque
stringData:
  # -- Postgres credentials (shared by postgres, label-studio, prefect-server) --
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"

  # -- Platform API database --
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres.finetune.svc.cluster.local:5432/finetune"

  # -- Prefect server database --
  PREFECT_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres.finetune.svc.cluster.local:5432/prefect"

  # -- Label Studio credentials --
  LABEL_STUDIO_API_KEY: "ls-smoke-token-for-local-dev"
  LABEL_STUDIO_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres.finetune.svc.cluster.local:5432/labelstudio"
  LABEL_STUDIO_USERNAME: "admin@example.com"
  LABEL_STUDIO_PASSWORD: "admin123"

  # -- LLM credentials for VQA inference worker --
  LLM_API_KEY: "local-dev-token"

  # -- MinIO credentials --
  MINIO_ENDPOINT: "minio.finetune.svc.cluster.local:9000"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  MINIO_BUCKET: "finetune-artifacts"
