apiVersion: v1
kind: ServiceAccount
metadata:
  name: finetune-api
  namespace: finetune
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: finetune-api-role
  namespace: finetune
rules:
  - apiGroups: ["kubeflow.org"]
    resources: ["pytorchjobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: finetune-api-rb
  namespace: finetune
subjects:
  - kind: ServiceAccount
    name: finetune-api
    namespace: finetune
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: finetune-api-role
